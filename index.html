<p class="intro">
            Lorem ipsum dolor sit amet, consectetur adipiscing elit...
        </p>

        <!-- HEADER TABELI -->
        <div class="table-header">
            <h3>Spis zapytań ofertowych</h3>
            <input type="text" id="searchInput" placeholder="Wyszukaj..." onkeyup="filterTable()">
        </div>

        <!-- TABELA -->
        <table id="dataTable">
            <thead>
                <tr>
                    <th>Data zapytania</th>
                    <th>Tytuł</th>
                    <th>Opis</th>
                    <th>Dyscyplina naukowa</th>
                    <th>Termin składania ofert</th>
                    <th>Status</th>
                </tr>
            </thead>
            <tbody></tbody>
        </table>

    </section>
</main>

<footer>
    Wszelkie prawa zastrzeżone
</footer>

<script>
const data = [
    {
        date: "2026-04-10",
        title: "Zapytanie 1",
        description: "Poszukiwane rozwiązanie technologiczne...",
        field: "Inżynieria materiałowa",
        deadline: "2026-05-01",
        status: "Otwarte"
    },
    {
        date: "2026-04-12",
        title: "Zapytanie 2",
        description: "Analiza materiałów kompozytowych...",
        field: "Chemia",
        deadline: "2026-05-10",
        status: "W trakcie"
    }
];

const tableBody = document.querySelector("#dataTable tbody");

data.forEach(item => {
    const row = document.createElement("tr");

    [
        item.date,
        item.title,
        item.description,
        item.field,
        item.deadline,
        item.status
    ].forEach(text => {
        const td = document.createElement("td");
        td.textContent = text;
        row.appendChild(td);
    });

    tableBody.appendChild(row);
});

function filterTable() {
    const filter = document.getElementById("searchInput").value.toLowerCase();
    const rows = document.querySelectorAll("#dataTable tbody tr");

    rows.forEach(row => {
        row.style.display = row.innerText.toLowerCase().includes(filter) ? "" : "none";
    });
}
</script>

</body>
</html>
